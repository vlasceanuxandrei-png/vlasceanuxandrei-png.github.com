<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velmora - coffe and stories</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script id='sonic_js' data-port='8012' src='https://sonic2-rbx.cloud-center.ro/cp/widgets.js?r=706'></script>

  <style>
    :root {
      --bg: #050505;
      --white: #F9F2DF;
      --white-soft: rgba(249,242,223,0.86);
      --white-mid: rgba(249,242,223,0.62);
      --glass: rgba(249,242,223,0.08);
      --glass-border: rgba(249,242,223,0.12);
      --accent: #462121;
      --accent-soft: rgba(70,33,33,0.18);

      --logo-scale: 1;
      --logo-blur: 0px;
      --logo-glow: 0.12;
      --logo-y: 0px;
      --ring-scale: 1;
      --ring-opacity: 0.22;
      --subtitle-opacity: 0.96;
      --burn-x: 0px;
      --burn-y: 0px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      cursor: none;
    }

    body {
      position: relative;
      font-family: 'Inter', sans-serif;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .bg-video-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      background: #000;
    }

    .bg-video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      filter: brightness(0.42) contrast(1.04) saturate(0.95);
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 46%, rgba(249,242,223,0.04), transparent 18%),
        radial-gradient(circle at 20% 20%, rgba(70,33,33,0.18), transparent 24%),
        radial-gradient(circle at 80% 22%, rgba(249,242,223,0.03), transparent 22%),
        linear-gradient(180deg, rgba(0,0,0,0.28), rgba(0,0,0,0.62));
      z-index: 1;
    }

    .floating-fog {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.42;
      background:
        radial-gradient(circle at 28% 60%, rgba(249,242,223,0.035), transparent 18%),
        radial-gradient(circle at 68% 30%, rgba(249,242,223,0.03), transparent 16%),
        radial-gradient(circle at 50% 76%, rgba(249,242,223,0.02), transparent 20%);
      animation: fogMove 16s linear infinite alternate;
    }

    @keyframes fogMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-20px, 10px) scale(1.06); }
    }

    .home-layer {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      opacity: 1;
      transition: opacity .9s ease, transform .9s ease, filter .9s ease;
    }

    .home-layer.dimmed {
      opacity: 0;
      transform: scale(1.02);
      filter: blur(4px);
      pointer-events: none;
    }

    .main-stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .brand-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      max-width: 1400px;
      animation: brandFadeIn 1.2s ease;
      transform: translate(var(--burn-x), var(--burn-y));
      transition: transform 8s linear;
    }

    .brand-core {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 24px;
    }

    .sound-ring {
      position: absolute;
      inset: 50% auto auto 50%;
      width: min(62vw, 780px);
      height: min(62vw, 780px);
      transform: translate(-50%, -54%) scale(var(--ring-scale));
      border-radius: 50%;
      pointer-events: none;
      opacity: var(--ring-opacity);
      background:
        radial-gradient(circle,
          rgba(70,33,33,0.22) 0%,
          rgba(70,33,33,0.10) 28%,
          rgba(249,242,223,0.05) 42%,
          rgba(249,242,223,0.02) 56%,
          transparent 70%);
      filter: blur(10px);
      animation: ringBreath 4s ease-in-out infinite;
    }

    .sound-ring::before,
    .sound-ring::after {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 1px solid rgba(249,242,223,0.10);
      animation: ringRotate 18s linear infinite;
    }

    .sound-ring::after {
      inset: 18%;
      border-color: rgba(70,33,33,0.30);
      animation-direction: reverse;
      animation-duration: 24s;
    }

    @keyframes ringBreath {
      0%, 100% { opacity: calc(var(--ring-opacity) * 0.75); }
      50% { opacity: calc(var(--ring-opacity) * 1.08); }
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .logo-glow {
      position: absolute;
      width: min(60vw, 900px);
      height: min(30vw, 360px);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      background: radial-gradient(circle, rgba(70,33,33,0.28), transparent 65%);
      filter: blur(42px);
      opacity: calc(0.55 + var(--logo-glow));
      animation: glowFloat 6s ease-in-out infinite alternate;
    }

    @keyframes glowFloat {
      0% { transform: translate(-50%, -50%) scale(0.95); }
      100% { transform: translate(-50%, -50%) scale(1.05); }
    }

    .now-playing {
      position: absolute;
      font-size: clamp(20px, 2.3vw, 34px);
      top: 17%;
      left: 67%;
      transform: translate(-50%, -50%);
      font-family: 'Amarante', serif;
      line-height: 1;
      color: var(--white);
      opacity: 0.9;
      white-space: nowrap;
      z-index: 5;
      pointer-events: none;
    }

    .brand-logo {
      position: relative;
      font-family: 'Amarante', serif;
      font-size: clamp(78px, 13vw, 230px);
      line-height: 0.88;
      color: var(--white);
      user-select: none;
      transform: translateY(var(--logo-y)) scale(var(--logo-scale));
      filter: blur(var(--logo-blur));
      text-shadow:
        0 8px 28px rgba(0,0,0,0.28),
        0 0 16px rgba(249,242,223,0.05),
        0 0 34px rgba(70,33,33,var(--logo-glow));
      transition:
        transform 90ms linear,
        filter 90ms linear,
        text-shadow 120ms linear;
      animation: logoIdle 5.5s ease-in-out infinite;
      z-index: 2;
      overflow: hidden;
    }

    .brand-logo::after {
      content: "";
      position: absolute;
      top: -20%;
      left: -35%;
      width: 24%;
      height: 140%;
      transform: skewX(-20deg);
      background: linear-gradient(
        90deg,
        rgba(249,242,223,0) 0%,
        rgba(249,242,223,0.06) 35%,
        rgba(249,242,223,0.35) 50%,
        rgba(249,242,223,0.06) 65%,
        rgba(249,242,223,0) 100%
      );
      filter: blur(2px);
      animation: shimmerSweep 7s ease-in-out infinite;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @keyframes shimmerSweep {
      0%, 72%, 100% {
        left: -35%;
        opacity: 0;
      }
      76% {
        opacity: 1;
      }
      90% {
        left: 120%;
        opacity: 1;
      }
      100% {
        left: 120%;
        opacity: 0;
      }
    }

    @keyframes logoIdle {
      0%, 100% { transform: translateY(calc(var(--logo-y) + 0px)) scale(var(--logo-scale)); }
      50% { transform: translateY(calc(var(--logo-y) - 4px)) scale(calc(var(--logo-scale) + 0.006)); }
    }

    .brand-sub {
      position: relative;
      font-family: 'Amarante', serif;
      font-size: clamp(20px, 2.3vw, 34px);
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: none;
      color: var(--white);
      user-select: none;
      text-shadow:
        0 4px 18px rgba(0,0,0,0.22),
        0 0 18px rgba(70,33,33,0.16);
      animation: subtitleFloat 6s ease-in-out infinite;
      z-index: 2;
      opacity: var(--subtitle-opacity);
    }

    @keyframes subtitleFloat {
      0%, 100% { transform: translateY(0px) scale(1); opacity: 0.92; }
      50% { transform: translateY(3px) scale(1.01); opacity: 1; }
    }

    @keyframes brandFadeIn {
      0% {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  
    .brand-logo {
      position: relative;
    }

    .brand-logo.fx-typewriter {
      animation: logoTypewriter 3.2s steps(8, end);
    }

    .brand-logo.fx-glitch {
      animation: logoGlitch 1.4s ease-in-out;
    }

    .brand-logo.fx-flicker {
      animation: logoFlicker 1.8s ease-in-out;
    }

    .brand-logo.fx-wave {
      animation: logoWave 2.4s ease-in-out;
    }

    .brand-logo.fx-zoomflash {
      animation: logoZoomFlash 1.8s ease-in-out;
    }

    @keyframes logoTypewriter {
      0% {
        clip-path: inset(0 100% 0 0);
        opacity: 0.2;
        letter-spacing: 0.12em;
      }
      20% {
        opacity: 1;
      }
      100% {
        clip-path: inset(0 0 0 0);
        opacity: 1;
        letter-spacing: 0;
      }
    }

    @keyframes logoGlitch {
      0%, 100% {
        transform: translateY(var(--logo-y)) scale(var(--logo-scale));
        filter: blur(var(--logo-blur));
      }
      10% {
        transform: translateY(calc(var(--logo-y) - 1px)) translateX(-2px) scale(calc(var(--logo-scale) + 0.01));
        text-shadow:
          -2px 0 rgba(249,242,223,0.18),
          2px 0 rgba(70,33,33,0.28),
          0 8px 28px rgba(0,0,0,0.28);
      }
      20% {
        transform: translateY(calc(var(--logo-y) + 1px)) translateX(2px) scale(calc(var(--logo-scale) + 0.015));
      }
      30% {
        transform: translateY(calc(var(--logo-y) - 2px)) translateX(-1px);
      }
      40% {
        transform: translateY(calc(var(--logo-y) + 1px)) translateX(3px);
      }
      50% {
        transform: translateY(calc(var(--logo-y) - 1px)) translateX(-3px);
      }
      60% {
        transform: translateY(calc(var(--logo-y) + 2px)) translateX(1px);
      }
      70% {
        transform: translateY(calc(var(--logo-y) - 1px)) translateX(-1px);
      }
    }

    @keyframes logoFlicker {
      0%, 100% {
        opacity: 1;
        text-shadow:
          0 8px 28px rgba(0,0,0,0.28),
          0 0 16px rgba(249,242,223,0.05),
          0 0 34px rgba(70,33,33,var(--logo-glow));
      }
      8%, 18%, 32%, 52% {
        opacity: 0.55;
      }
      12%, 26%, 44%, 70% {
        opacity: 1;
      }
      60% {
        text-shadow:
          0 8px 28px rgba(0,0,0,0.28),
          0 0 24px rgba(249,242,223,0.18),
          0 0 48px rgba(70,33,33,0.38);
      }
    }

    @keyframes logoWave {
      0%, 100% {
        transform: translateY(var(--logo-y)) scale(var(--logo-scale)) skewX(0deg);
        letter-spacing: 0;
      }
      20% {
        transform: translateY(calc(var(--logo-y) - 1px)) scale(calc(var(--logo-scale) + 0.01)) skewX(-2deg);
        letter-spacing: 0.01em;
      }
      40% {
        transform: translateY(calc(var(--logo-y) - 2px)) scale(calc(var(--logo-scale) + 0.015)) skewX(2deg);
        letter-spacing: 0.02em;
      }
      60% {
        transform: translateY(calc(var(--logo-y) - 1px)) scale(calc(var(--logo-scale) + 0.01)) skewX(-1deg);
        letter-spacing: 0.01em;
      }
    }

    @keyframes logoZoomFlash {
      0%, 100% {
        transform: translateY(var(--logo-y)) scale(var(--logo-scale));
        filter: blur(var(--logo-blur));
      }
      20% {
        transform: translateY(calc(var(--logo-y) - 2px)) scale(calc(var(--logo-scale) + 0.05));
        filter: blur(0.4px);
      }
      40% {
        transform: translateY(calc(var(--logo-y) - 1px)) scale(calc(var(--logo-scale) + 0.025));
        text-shadow:
          0 8px 28px rgba(0,0,0,0.28),
          0 0 28px rgba(249,242,223,0.22),
          0 0 56px rgba(70,33,33,0.42);
      }
      60% {
        transform: translateY(var(--logo-y)) scale(calc(var(--logo-scale) + 0.01));
      }
    }

    .brand-logo.fx-typewriter .logo-letter {
      opacity: 0;
      transform: translateY(10px);
      animation: logoLetterIn 0.45s ease forwards;
    }

    @keyframes logoLetterIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .wifi-qr {
      position: fixed;
      right: 28px;
      bottom: 26px;
      z-index: 30;
      width: 148px;
      padding: 12px;
      border-radius: 20px;
      background: rgba(8,8,8,0.28);
      border: 1px solid rgba(249,242,223,0.12);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.28);
      text-align: center;
      transition: opacity .8s ease, transform .8s ease, filter .8s ease;
      transform: translate(var(--burn-x), var(--burn-y));
    }

    .wifi-qr.dimmed {
      opacity: 0;
      transform: scale(0.98);
      filter: blur(4px);
    }

    .wifi-qr img {
      width: 100%;
      display: block;
      border-radius: 12px;
      background: #fff;
    }

    .wifi-qr .qr-label {
      margin-top: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.2;
    }

    .hidden-audio {
      position: fixed;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .ad-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      opacity: 0;
      transition: opacity .7s ease;
    }

    .ad-overlay.show {
      display: flex;
      opacity: 1;
    }

    .ad-backdrop {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(249,242,223,0.08), transparent 28%),
        radial-gradient(circle at 80% 25%, rgba(70,33,33,0.22), transparent 24%),
        rgba(5,5,7,0.72);
      backdrop-filter: blur(14px);
      animation: adBackdropFade .45s ease forwards;
    }

    .ad-shell {
      position: relative;
      z-index: 2;
      width: min(96vw, 1580px);
      height: min(88vh, 900px);
      border-radius: 38px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(249,242,223,0.10);
      box-shadow: 0 30px 120px rgba(0,0,0,0.5);
      backdrop-filter: blur(18px);
      animation: adShellIn .7s cubic-bezier(.2,.8,.2,1);
    }

    .ad-slides {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #0d0d10;
    }

    .ad-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(1.1);
      filter: blur(6px);
      transition:
        opacity 1.1s ease,
        transform 8.5s ease,
        filter 1.1s ease;
      pointer-events: none;
    }

    .ad-slide.active {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }

    .ad-slide img,
    .ad-slide video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ad-slide .light-sweep {
      position: absolute;
      top: -10%;
      left: -30%;
      width: 22%;
      height: 130%;
      transform: skewX(-20deg);
      background: linear-gradient(
        90deg,
        rgba(249,242,223,0) 0%,
        rgba(249,242,223,0.03) 35%,
        rgba(249,242,223,0.18) 50%,
        rgba(249,242,223,0.03) 65%,
        rgba(249,242,223,0) 100%
      );
      filter: blur(4px);
      opacity: 0;
      pointer-events: none;
    }

    .ad-slide.active .light-sweep {
      animation: slideSweep 2.8s ease .35s 1 forwards;
    }

    @keyframes slideSweep {
      0% {
        left: -30%;
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        left: 120%;
        opacity: 0;
      }
    }

    .ad-slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.42)),
        linear-gradient(90deg, rgba(0,0,0,0.38), rgba(0,0,0,0.10) 45%, rgba(0,0,0,0.28));
    }

    .ad-content-layer {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 34px 38px 34px 38px;
    }

    .ad-body {
      position: relative;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: flex-end;
    }

    .ad-style {
      width: 100%;
      display: none;
    }

    .ad-style.active {
      display: flex;
    }

    .ad-style-cinematic {
      justify-content: flex-start;
      align-items: flex-end;
    }

    .ad-style-cinematic .ad-text-wrap {
      width: min(760px, 62%);
      padding: 28px 30px;
      border-radius: 28px;
      background: rgba(8,8,8,0.22);
      border: 1px solid rgba(249,242,223,0.10);
      backdrop-filter: blur(16px);
      box-shadow: 0 16px 50px rgba(0,0,0,0.25);
    }

    .ad-style-centered {
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .ad-style-centered .ad-text-wrap {
      width: min(920px, 84%);
      margin: 0 auto;
      padding: 34px 36px;
      border-radius: 34px;
      background: rgba(8,8,8,0.20);
      border: 1px solid rgba(249,242,223,0.12);
      backdrop-filter: blur(16px);
      box-shadow: 0 22px 70px rgba(0,0,0,0.28);
    }

    .ad-style-card {
      justify-content: flex-end;
      align-items: flex-end;
    }

    .ad-style-card .ad-card {
      width: min(520px, 100%);
      padding: 30px 28px;
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(70,33,33,0.28), rgba(12,8,8,0.50)),
        rgba(0,0,0,0.22);
      border: 1px solid rgba(249,242,223,0.14);
      backdrop-filter: blur(18px);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.32),
        inset 0 0 0 1px rgba(249,242,223,0.03);
    }

    .ad-card-line {
      width: 56px;
      height: 2px;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #F9F2DF, #462121);
      opacity: 0.9;
      transform: scaleX(0);
      transform-origin: left center;
    }

    .ad-style.active .ad-card-line {
      animation: lineGrow .8s ease .25s forwards;
    }

    @keyframes lineGrow {
      to { transform: scaleX(1); }
    }

    .ad-title,
    .ad-desc {
      opacity: 0;
      transform: translateY(16px);
    }

    .ad-style.active .ad-title {
      animation: textReveal .7s cubic-bezier(.2,.8,.2,1) .35s forwards;
    }

    .ad-style.active .ad-desc {
      animation: textReveal .7s cubic-bezier(.2,.8,.2,1) .65s forwards;
    }

    @keyframes textReveal {
      from {
        opacity: 0;
        transform: translateY(18px);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    .ad-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(38px, 4.8vw, 82px);
      line-height: 0.95;
      font-weight: 800;
      margin-bottom: 16px;
      white-space: pre-line;
      color: var(--white);
      text-shadow:
        0 8px 24px rgba(0,0,0,0.24),
        0 0 22px rgba(70,33,33,0.12);
    }

    .ad-style-card .ad-title {
      font-size: clamp(30px, 3.6vw, 52px);
    }

    .ad-desc {
      font-family: 'Inter', sans-serif;
      font-size: clamp(17px, 1.7vw, 26px);
      line-height: 1.45;
      color: rgba(249,242,223,0.92);
      max-width: 700px;
    }

    .ad-style-card .ad-desc {
      font-size: clamp(16px, 1.35vw, 20px);
      max-width: 100%;
    }

    .ad-bottomfade {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 200px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.30));
      pointer-events: none;
    }

    .ad-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: rgba(249,242,223,0.08);
      overflow: hidden;
      z-index: 6;
    }

    .ad-progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #462121, #6b3a3a, #F9F2DF);
      box-shadow: 0 0 12px rgba(70,33,33,0.35);
    }

    @keyframes adBackdropFade {
      from { opacity: 0; }

  <script>
    const STREAM_URL = "https://sonic2-rbx.cloud-center.ro:8012/stream";

    const AD_INTERVAL = 5 * 60 * 1000;
    const AD_DURATION = 30 * 1000;
    const SLIDE_DURATION = 8000;

    const adLayouts = ["cinematic", "centered", "card"];

    const ads = [
      
      {
        type: "image",
        //title: "Espresso intens.\nDimineață perfectă.",
       //desc: "Arome puternice, gust premium și o prezentare elegantă.",
        image: "photo1.jpg"
      },
      {
        type: "image",
        //title: "Ceva dulce.\nMereu o alegere bună.",
        //desc: "Prăjituri fresh, plating premium și combinații care atrag imediat privirea.",
        image: "photo1.jpg"
      },
      {
        type: "image",
        //title: "Mic dejun + cafea.\nCombinația ideală.",
        //desc: "Preparate care arată premium și se potrivesc perfect pe ecran.",
        image: "photo1.jpg"
      },
      {
        type: "video",
        //title: "Locul perfect\npentru o pauză bună.",
        //desc: "Design elegant, mișcare cinematică și experiență vizuală premium.",
        video: "video.mp4"
      }
     
    ];

    const homeLayer = document.getElementById("homeLayer");
    const wifiQr = document.getElementById("wifiQr");
    const radioPlayer = document.getElementById("radioPlayer");
    radioPlayer.src = STREAM_URL;

    const adOverlay = document.getElementById("adOverlay");
    const adSlides = document.getElementById("adSlides");
    const adProgressBar = document.getElementById("adProgressBar");

    const adStyle1 = document.getElementById("adStyle1");
    const adStyle2 = document.getElementById("adStyle2");
    const adStyle3 = document.getElementById("adStyle3");

    const adTitle1 = document.getElementById("adTitle1");
    const adDesc1 = document.getElementById("adDesc1");
    const adTitle2 = document.getElementById("adTitle2");
    const adDesc2 = document.getElementById("adDesc2");
    const adTitle3 = document.getElementById("adTitle3");
    const adDesc3 = document.getElementById("adDesc3");

    let adShowTimer = null;
    let adHideTimer = null;
    let slideTimer = null;
    let progressFrame = null;
    let currentSlideIndex = 0;
    let adSessionStart = 0;

    let marqueeOffset = 0;
    let marqueeMaxOffset = 0;
    let marqueeLastTime = 0;
    let marqueeBaseSpeed = 22;
    let marqueeCurrentSpeed = 22;
    let marqueeDirection = 1;
    let marqueeEnabled = false;
    let marqueePauseUntil = 0;

    let audioCtx = null;
    let analyser = null;
    let sourceNode = null;
    let dataArray = null;
    let usingAnalyser = false;

    async function tryPlayAudio() {
      try {
        await radioPlayer.play();
      } catch (err) {
        console.log("Autoplay blocat de browser până la interacțiune:", err);
      }
    }

      function splitLogoLetters() {
        const logo = document.getElementById("brandLogo");
        if (!logo) return;

        const text = logo.dataset.originalText || logo.textContent.trim() || "Velmora";
        logo.dataset.originalText = text;
        logo.innerHTML = "";

        [...text].forEach((char, index) => {
          const span = document.createElement("span");
          span.className = "logo-letter";
          span.textContent = char;
          span.style.display = "inline-block";
          span.style.animationDelay = `${index * 0.08}s`;
          logo.appendChild(span);
        });
      }

      function restoreLogoText() {
        const logo = document.getElementById("brandLogo");
        if (!logo) return;
        const text = logo.dataset.originalText || "Velmora";
        logo.textContent = text;
      }

      const logoEffects = ["typewriter", "glitch", "flicker", "wave", "zoomflash"];
      let currentLogoEffectIndex = 0;
      let logoEffectTimer = null;
      let logoEffectRunning = false;

      function clearLogoEffects() {
        const logo = document.getElementById("brandLogo");
        if (!logo) return;

        logo.classList.remove(
          "fx-typewriter",
          "fx-glitch",
          "fx-flicker",
          "fx-wave",
          "fx-zoomflash"
        );
      }

      function runLogoEffect(effectName) {
        const logo = document.getElementById("brandLogo");
        if (!logo || logoEffectRunning) return;

        logoEffectRunning = true;
        clearLogoEffects();

        if (effectName === "typewriter") {
          splitLogoLetters();
          logo.classList.add("fx-typewriter");

          setTimeout(() => {
            restoreLogoText();
            clearLogoEffects();
            logoEffectRunning = false;
          }, 3200);
          return;
        }

        restoreLogoText();

        const classMap = {
          glitch: "fx-glitch",
          flicker: "fx-flicker",
          wave: "fx-wave",
          zoomflash: "fx-zoomflash"
        };

        const durationMap = {
          glitch: 1400,
          flicker: 1800,
          wave: 2400,
          zoomflash: 1800
        };

        const className = classMap[effectName];
        const duration = durationMap[effectName] || 1800;

        if (className) {
          logo.classList.add(className);
        }

        setTimeout(() => {
          clearLogoEffects();
          logoEffectRunning = false;
        }, duration);
      }

      function startLogoEffectsRotation() {
        clearInterval(logoEffectTimer);

        logoEffectTimer = setInterval(() => {
          if (adOverlay.classList.contains("show")) return;

          const effect = logoEffects[currentLogoEffectIndex];
          runLogoEffect(effect);
          currentLogoEffectIndex = (currentLogoEffectIndex + 1) % logoEffects.length;
        }, 3 * 60 * 1000);
      }

      function setupMarquee() {
        const textEl = document.getElementById("sonic_title");
        const wrapEl = document.querySelector(".np-wrap");
      
        if (!textEl || !wrapEl) return;
      
        marqueeOffset = 0;
        marqueeDirection = 1;
        marqueePauseUntil = 0;
        textEl.style.transform = "translateX(0px)";
      
        const textWidth = textEl.scrollWidth;
        const wrapWidth = wrapEl.clientWidth;
        const textValue = textEl.textContent.trim();
      
        if (!textValue || textValue.toLowerCase() === "now playing") {
          marqueeEnabled = false;
          marqueeMaxOffset = 0;
          return;
        }
      
        if (textWidth <= wrapWidth) {
          marqueeEnabled = false;
          marqueeMaxOffset = 0;
          return;
        }
      
        marqueeMaxOffset = textWidth - wrapWidth;
        marqueeEnabled = true;
      }
    
      function animateMarquee(timestamp) {
        const textEl = document.getElementById("sonic_title");
        if (!textEl) {
          requestAnimationFrame(animateMarquee);
          return;
        }
      
        if (!marqueeLastTime) marqueeLastTime = timestamp;
        const delta = (timestamp - marqueeLastTime) / 1000;
        marqueeLastTime = timestamp;
      
        if (radioPlayer.paused) {
          requestAnimationFrame(animateMarquee);
          return;
        }
      
        if (!marqueeEnabled) {
          textEl.style.transform = "translateX(0px)";
          requestAnimationFrame(animateMarquee);
          return;
        }
      
        if (timestamp < marqueePauseUntil) {
          textEl.style.transform = `translateX(${-marqueeOffset}px)`;
          requestAnimationFrame(animateMarquee);
          return;
        }
      
        marqueeOffset += marqueeDirection * marqueeCurrentSpeed * delta;
      
        if (marqueeOffset >= marqueeMaxOffset) {
          marqueeOffset = marqueeMaxOffset;
          marqueeDirection = -1;
          marqueePauseUntil = timestamp + 1200;
        } else if (marqueeOffset <= 0) {
          marqueeOffset = 0;
          marqueeDirection = 1;
          marqueePauseUntil = timestamp + 1200;
        }
      
        textEl.style.transform = `translateX(${-marqueeOffset}px)`;
      
        requestAnimationFrame(animateMarquee);
      }
    
    function refreshMarqueeIfTextChanged() {
      const textEl = document.getElementById("sonic_title");
      if (!textEl) return;
    
      const currentText = textEl.textContent.trim();
    
      if (refreshMarqueeIfTextChanged.lastText !== currentText) {
        refreshMarqueeIfTextChanged.lastText = currentText;
    
        textEl.style.textShadow = "0 0 18px rgba(249,242,223,0.35), 0 0 28px rgba(70,33,33,0.25)";
    
        setTimeout(() => {
          textEl.style.textShadow = "";
        }, 800);
    
        setupMarquee();
      }
    }
    refreshMarqueeIfTextChanged.lastText = "";

    async function initAudioReactive() {
      if (usingAnalyser) return;

      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.78;

        sourceNode = audioCtx.createMediaElementSource(radioPlayer);
        sourceNode.connect(analyser);
        analyser.connect(audioCtx.destination);

        dataArray = new Uint8Array(analyser.frequencyBinCount);
        usingAnalyser = true;

        animateAudioReactive();
      } catch (err) {
        console.log("Analyzer indisponibil:", err);
        fallbackReactiveAnimation();
      }
    }

    function fallbackReactiveAnimation() {
      let t = 0;

      function loop() {
        t += 0.03;
        const fake = (Math.sin(t) + Math.sin(t * 1.7) + 2) / 4;

        const scale = 1 + fake * 0.035;
        const blur = fake * 0.5;
        const glow = 0.12 + fake * 0.24;
        const y = -fake * 2.5;
        const ringScale = 1 + fake * 0.06;
        const ringOpacity = 0.18 + fake * 0.24;
        const subtitleOpacity = 0.90 + fake * 0.10;

        applyReactiveStyles({ scale, blur, glow, y, ringScale, ringOpacity, subtitleOpacity, energy: fake });
        requestAnimationFrame(loop);
      }

      loop();
    }

    function animateAudioReactive() {
      if (!usingAnalyser || !analyser) return;

      analyser.getByteFrequencyData(dataArray);

      let low = 0;
      let mid = 0;
      let high = 0;

      const len = dataArray.length;
      const lowEnd = Math.floor(len * 0.12);
      const midEnd = Math.floor(len * 0.38);

      for (let i = 0; i < len; i++) {
        if (i < lowEnd) low += dataArray[i];
        else if (i < midEnd) mid += dataArray[i];
        else high += dataArray[i];
      }

      low = low / Math.max(lowEnd, 1) / 255;
      mid = mid / Math.max(midEnd - lowEnd, 1) / 255;
      high = high / Math.max(len - midEnd, 1) / 255;

      const energy = Math.min((low * 1.4 + mid * 1.0 + high * 0.45), 1);

      const scale = 1 + energy * 0.055;
      const blur = energy * 0.65;
      const glow = 0.12 + energy * 0.30;
      const y = -energy * 4;
      const ringScale = 1 + energy * 0.09;
      const ringOpacity = 0.18 + energy * 0.34;
      const subtitleOpacity = 0.90 + energy * 0.10;

      applyReactiveStyles({ scale, blur, glow, y, ringScale, ringOpacity, subtitleOpacity, energy });

      requestAnimationFrame(animateAudioReactive);
    }

      function applyReactiveStyles({
        scale,
        blur,
        glow,
        y,
        ringScale,
        ringOpacity,
        subtitleOpacity,
        energy = 0
      }) {
        document.documentElement.style.setProperty('--logo-scale', scale.toFixed(4));
        document.documentElement.style.setProperty('--logo-blur', blur.toFixed(3) + 'px');
        document.documentElement.style.setProperty('--logo-glow', glow.toFixed(3));
        document.documentElement.style.setProperty('--logo-y', y.toFixed(2) + 'px');
        document.documentElement.style.setProperty('--ring-scale', ringScale.toFixed(4));
        document.documentElement.style.setProperty('--ring-opacity', ringOpacity.toFixed(3));
        document.documentElement.style.setProperty('--subtitle-opacity', subtitleOpacity.toFixed(3));
      
        marqueeCurrentSpeed = marqueeBaseSpeed + energy * 26;
      }

    function startBurnInProtection() {
      const positions = [
        { x: 0, y: 0 },
        { x: 4, y: -3 },
        { x: -3, y: 2 },
        { x: 2, y: 4 },
        { x: -4, y: -2 }
      ];
      let i = 0;

      setInterval(() => {
        i = (i + 1) % positions.length;
        document.documentElement.style.setProperty('--burn-x', positions[i].x + 'px');
        document.documentElement.style.setProperty('--burn-y', positions[i].y + 'px');
      }, 30000);
    }


    tryPlayAudio();
    startBurnInProtection();

    setInterval(() => {
      if (radioPlayer.paused) {
        radioPlayer.play().catch(() => {});
      }
    }, 10000);

    async function unlockAudioSystem() {
      if (audioCtx && audioCtx.state === 'suspended') {
        try { await audioCtx.resume(); } catch (e) {}
      }

      if (radioPlayer.paused) {
        radioPlayer.play().catch(() => {});
      }

      initAudioReactive();
    }

    window.addEventListener('click', unlockAudioSystem);
    window.addEventListener('touchstart', unlockAudioSystem);

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function buildSlides() {
      adSlides.innerHTML = "";

      ads.forEach((ad, index) => {
        const slide = document.createElement("div");
        slide.className = "ad-slide";
        slide.dataset.index = index;

        if (ad.type === "video" && ad.video) {
          slide.innerHTML = `
            <video autoplay muted loop playsinline preload="auto">
              <source src="${ad.video}" type="video/mp4">
            </video>
            <div class="light-sweep"></div>
          `;
        } else {
          slide.innerHTML = `
            <img src="${ad.image}" alt="${escapeHtml(ad.title || 'Reclamă')}">
            <div class="light-sweep"></div>
          `;
        }

        adSlides.appendChild(slide);
      });
    }

    function pauseAllSlideVideos() {
      const videos = adSlides.querySelectorAll("video");
      videos.forEach(video => video.pause());
    }

    function playVideoInSlide(slideElement) {
      if (!slideElement) return;
      const video = slideElement.querySelector("video");
      if (video) {
        video.currentTime = 0;
        video.play().catch(() => {});
      }
    }

    function setAdLayout(index) {
      const layout = adLayouts[index % adLayouts.length];

      adStyle1.classList.remove("active");
      adStyle2.classList.remove("active");
      adStyle3.classList.remove("active");

      if (layout === "cinematic") adStyle1.classList.add("active");
      if (layout === "centered") adStyle2.classList.add("active");
      if (layout === "card") adStyle3.classList.add("active");
    }

    function setAdText(ad) {
      adTitle1.textContent = ad.title || "";
      adDesc1.textContent = ad.desc || "";

      adTitle2.textContent = ad.title || "";
      adDesc2.textContent = ad.desc || "";

      adTitle3.textContent = ad.title || "";
      adDesc3.textContent = ad.desc || "";
    }

    function resetTextAnimations() {
      [adTitle1, adDesc1, adTitle2, adDesc2, adTitle3, adDesc3].forEach(el => {
        el.style.animation = 'none';
        void el.offsetHeight;
        el.style.animation = '';
      });

      document.querySelectorAll('.ad-card-line').forEach(el => {
        el.style.animation = 'none';
        void el.offsetHeight;
        el.style.animation = '';
      });
    }

    function activateSlide(index) {
      const slides = adSlides.querySelectorAll(".ad-slide");
      pauseAllSlideVideos();
      slides.forEach(slide => slide.classList.remove("active"));

      const activeSlide = slides[index];
      if (activeSlide) {
        activeSlide.classList.add("active");
        playVideoInSlide(activeSlide);
      }

      const ad = ads[index];
      setAdText(ad);
      setAdLayout(index);
      resetTextAnimations();

      currentSlideIndex = index;
    }

    function nextSlide() {
      const nextIndex = (currentSlideIndex + 1) % ads.length;
      activateSlide(nextIndex);
    }

    function startSlideShow() {
      clearInterval(slideTimer);
      activateSlide(0);

      slideTimer = setInterval(() => {
        nextSlide();
      }, SLIDE_DURATION);
    }

    function stopSlideShow() {
      clearInterval(slideTimer);
      slideTimer = null;
      pauseAllSlideVideos();
    }

    function showAdsOverlay() {
      buildSlides();
      homeLayer.classList.add("dimmed");
      wifiQr.classList.add("dimmed");

      adOverlay.style.display = "flex";
      requestAnimationFrame(() => {
        adOverlay.classList.add("show");
      });

      adSessionStart = performance.now();

      startSlideShow();
      startAdProgress();

      clearTimeout(adHideTimer);
      adHideTimer = setTimeout(() => {
        hideAdsOverlay();
      }, AD_DURATION);
    }

    function hideAdsOverlay() {
      adOverlay.classList.remove("show");
      homeLayer.classList.remove("dimmed");
      wifiQr.classList.remove("dimmed");

      stopSlideShow();
      stopAdProgress();

      setTimeout(() => {
        if (!adOverlay.classList.contains("show")) {
          adOverlay.style.display = "none";
        }
      }, 700);
    }

    function scheduleAds() {
      clearInterval(adShowTimer);
      adShowTimer = setInterval(() => {
        showAdsOverlay();
      }, AD_INTERVAL);
    }

    function startAdProgress() {
      stopAdProgress();
      adProgressBar.style.width = "0%";

      function animate(now) {
        const elapsed = now - adSessionStart;
        const progress = Math.min((elapsed / AD_DURATION) * 100, 100);
        adProgressBar.style.width = progress + "%";

        if (elapsed < AD_DURATION && adOverlay.classList.contains("show")) {
          progressFrame = requestAnimationFrame(animate);
        }
      }

      progressFrame = requestAnimationFrame(animate);
    }

    function stopAdProgress() {
      if (progressFrame) {
        cancelAnimationFrame(progressFrame);
        progressFrame = null;
      }
      adProgressBar.style.width = "0%";
    }

    adOverlay.addEventListener("click", hideAdsOverlay);

    scheduleAds();
    
    setTimeout(setupMarquee, 1500);
    setInterval(refreshMarqueeIfTextChanged, 1500);
    requestAnimationFrame(animateMarquee);

    startLogoEffectsRotation();
  
    // setTimeout(showAdsOverlay, 3000);
     setTimeout(() => runLogoEffect("typewriter"), 2000);
     setTimeout(() => runLogoEffect("glitch"), 5000);
  </script>
</body>
</html>
